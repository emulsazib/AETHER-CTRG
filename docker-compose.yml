# =============================================================================
# AETHER Framework — FULL STACK (databases + all three services)
# -----------------------------------------------------------------------------
# One command to run everything:
#     docker compose up --build
#
# Services & published ports:
#     frontend    -> http://localhost:5173   (nginx-served React SPA)
#     backend     -> http://localhost:4000    (Node/Express API gateway)
#     ml-worker   -> http://localhost:8000    (Python/FastAPI inference)
#     mongo       -> localhost:27017
#     neo4j       -> http://localhost:7474 (browser) / bolt 7687
#
# Inter-container traffic uses service names as hostnames on the default network
# (e.g. backend reaches the worker at http://ml-worker:8000). The browser talks
# to the gateway via the host-published http://localhost:4000 (baked into the
# frontend at build time via VITE_API_BASE).
# =============================================================================

services:
  mongo:
    image: mongo:7
    container_name: aether-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aether}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-aether_dev_pw}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5
    container_name: aether-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-aether_dev_pw}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      # cypher-shell ships in the image; succeeds only once Bolt accepts auth.
      # Single-$ => compose bakes the credentials in at parse time.
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-aether_dev_pw} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ml-worker:
    build:
      context: ./ml-worker
      args:
        # Set INSTALL_ML=true to bake in the trained-classifier deps (torch/transformers).
        INSTALL_ML: ${INSTALL_ML:-false}
    container_name: aether-ml-worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount your trained model(s) read-only (see ml-worker/models/README.md).
      - ./ml-worker/models:/models:ro
    environment:
      ML_WORKER_PORT: 8000
      # Allow the gateway (and host browser, for debugging) to call directly.
      ML_CORS_ORIGINS: http://localhost:4000,http://localhost:5173
      EMBEDDING_DIM: 16
      # --- External AI provider (any OpenAI-compatible gateway; replaces Ollama) ---
      # Leave AI_API_KEY blank to run the deterministic mock extractor instead.
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      # --- Trained ML classifier engine (your own model) --------------------------
      ML_CLASSIFIER_ENABLED: ${ML_CLASSIFIER_ENABLED:-false}
      CLASSIFIER_PATH: ${CLASSIFIER_PATH:-}
      CLASSIFIER_NAME: ${CLASSIFIER_NAME:-Trained ML Classifier}
      CLASSIFIER_BACKEND: ${CLASSIFIER_BACKEND:-hf}
      CLASSIFIER_MALICIOUS_INDEX: ${CLASSIFIER_MALICIOUS_INDEX:-1}
      CLASSIFIER_THRESHOLD: ${CLASSIFIER_THRESHOLD:-0.5}
      CLASSIFIER_MAX_LEN: ${CLASSIFIER_MAX_LEN:-512}
      # --- OpenCTI attribution push (pycti) ---------------------------------------
      # OPENCTI_ENABLED stays false unless you bring up the `opencti` profile below.
      OPENCTI_ENABLED: ${OPENCTI_ENABLED:-false}
      OPENCTI_URL: ${OPENCTI_URL:-http://opencti:8080}
      OPENCTI_TOKEN: ${OPENCTI_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: aether-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      # Browser origin allowed by CORS (the nginx-served frontend).
      CORS_ORIGINS: http://localhost:5173
      # Service-name hostnames on the compose network.
      MONGO_URI: mongodb://${MONGO_USER:-aether}:${MONGO_PASSWORD:-aether_dev_pw}@mongo:27017/aether?authSource=admin
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-aether_dev_pw}
      ML_WORKER_URL: http://ml-worker:8000
      ML_WORKER_TIMEOUT_MS: 15000
    depends_on:
      mongo:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ml-worker:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle — must be the HOST-reachable gateway URL.
        VITE_API_BASE: http://localhost:4000/api/v1
        VITE_POLL_INTERVAL_MS: 2000
    container_name: aether-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ===========================================================================
  # OPENCTI ATTRIBUTION STACK  (optional — guarded by the `opencti` profile)
  # ---------------------------------------------------------------------------
  # NO Ollama: LLM processing is routed through the EXTERNAL AI API on ml-worker.
  #
  # This whole block only starts when you ask for it, so the core app stays light:
  #     docker compose up --build                       # app only (no OpenCTI)
  #     docker compose --profile opencti up --build     # app + OpenCTI (~6GB RAM)
  #
  # After it's healthy, set OPENCTI_ENABLED=true and OPENCTI_TOKEN=<OPENCTI_ADMIN_TOKEN>
  # in your .env so ml-worker pushes extracted IoCs/TTPs as STIX2 via pycti. The
  # bundled MITRE ATT&CK connector then auto-correlates TTPs to known actors.
  # ===========================================================================
  redis:
    image: redis:7.2
    container_name: aether-redis
    profiles: ["opencti"]
    restart: unless-stopped
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: aether-elasticsearch
    profiles: ["opencti"]
    restart: unless-stopped
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - thread_pool.search.queue_size=5000
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-58Z
    container_name: aether-minio
    profiles: ["opencti"]
    restart: unless-stopped
    command: server /data
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aether_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aether_password123}

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: aether-rabbitmq
    profiles: ["opencti"]
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-aether}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-aether_password123}

  opencti:
    image: opencti/platform:${OPENCTI_VERSION:-6.4.1}
    container_name: aether-opencti-platform
    profiles: ["opencti"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_OPTIONS: --max-old-space-size=8096
      APP__PORT: 8080
      APP__BASE_URL: ${OPENCTI_BASE_URL:-http://localhost:8080}
      APP__ADMIN__EMAIL: ${OPENCTI_ADMIN_EMAIL:-admin@aether.local}
      APP__ADMIN__PASSWORD: ${OPENCTI_ADMIN_PASSWORD:-aether_admin_password123}
      APP__ADMIN__TOKEN: ${OPENCTI_ADMIN_TOKEN:-d434ce02-2911-4c1a-9c1a-1a1b9c0a1aether}
      APP__APP_LOGS__LOGS_LEVEL: error
      REDIS__HOSTNAME: redis
      REDIS__PORT: 6379
      ELASTICSEARCH__URL: http://elasticsearch:9200
      MINIO__ENDPOINT: minio
      MINIO__PORT: 9000
      MINIO__USE_SSL: "false"
      MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-aether_admin}
      MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-aether_password123}
      RABBITMQ__HOSTNAME: rabbitmq
      RABBITMQ__PORT: 5672
      RABBITMQ__PORT_MANAGEMENT: 15672
      RABBITMQ__MANAGEMENT_SSL: "false"
      RABBITMQ__USERNAME: ${RABBITMQ_USER:-aether}
      RABBITMQ__PASSWORD: ${RABBITMQ_PASSWORD:-aether_password123}
      PROVIDERS__LOCAL__STRATEGY: LocalStrategy
    depends_on:
      - redis
      - elasticsearch
      - minio
      - rabbitmq

  opencti-worker:
    image: opencti/worker:${OPENCTI_VERSION:-6.4.1}
    container_name: aether-opencti-worker
    profiles: ["opencti"]
    restart: unless-stopped
    environment:
      OPENCTI_URL: http://opencti:8080
      OPENCTI_TOKEN: ${OPENCTI_ADMIN_TOKEN:-d434ce02-2911-4c1a-9c1a-1a1b9c0a1aether}
      WORKER_LOG_LEVEL: info
    depends_on:
      - opencti

  connector-mitre:
    image: opencti/connector-mitre:${OPENCTI_VERSION:-6.4.1}
    container_name: aether-connector-mitre
    profiles: ["opencti"]
    restart: unless-stopped
    environment:
      OPENCTI_URL: http://opencti:8080
      OPENCTI_TOKEN: ${OPENCTI_ADMIN_TOKEN:-d434ce02-2911-4c1a-9c1a-1a1b9c0a1aether}
      CONNECTOR_ID: ${CONNECTOR_MITRE_ID:-a3e1c5f2-7b4d-4e8a-9c6b-2f1d0e9a8b7c}
      CONNECTOR_TYPE: EXTERNAL_IMPORT
      CONNECTOR_NAME: MITRE ATT&CK
      CONNECTOR_SCOPE: tool,report,malware,identity,campaign,intrusion-set,attack-pattern,course-of-action,x-mitre-data-source,x-mitre-data-component,x-mitre-matrix,x-mitre-tactic,x-mitre-collection
      CONNECTOR_CONFIDENCE_LEVEL: 75
      CONNECTOR_UPDATE_EXISTING_DATA: "true"
      CONNECTOR_RUN_AND_TERMINATE: "false"
      CONNECTOR_LOG_LEVEL: error
      MITRE_INTERVAL: 7
    depends_on:
      - opencti

volumes:
  mongo_data:
  neo4j_data:
  neo4j_logs:
  # OpenCTI stack (only created when the `opencti` profile runs)
  redis_data:
  elastic_data:
  minio_data:
  rabbitmq_data:
