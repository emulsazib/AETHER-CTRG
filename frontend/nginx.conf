# Serve the built SPA. The try_files fallback routes all unknown paths to
# index.html so client-side routes (e.g. /analysis/:id, /graph) work on reload.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
